name: FreeCAD Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  export-freecad-mechanical:
    env:
      FREECAD_VERSION: "1.1.1"
      FREECAD_FILENAME: "./mechanical/mechanical.FCStd"
      FREECAD_OUTPUT_FOLDER: "./output"
      FREECAD_PARTTYPE: "PartDesign::Body"
    runs-on: ubuntu-latest
    steps:
    - name: Fetch repository
      uses: actions/checkout@v7
    
    - name: Prepare output directory
      run: |
        mkdir -p ${{ env.FREECAD_OUTPUT_FOLDER }}
        cp -r ./mechanical ${{ env.FREECAD_OUTPUT_FOLDER }}
        cp ./LICENSE ${{ env.FREECAD_OUTPUT_FOLDER }}

    - name: Install FreeCAD
      run: |
          wget https://github.com/FreeCAD/FreeCAD/releases/download/${{ env.FREECAD_VERSION }}/FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage
          chmod 0777 FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage
          ./FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage --appimage-extract
    
    - name: Get FreeCAD Export
      uses: actions/checkout@v7
      with:
        repository: 0x007E/pyfreecadexport
        path: ./
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Export STEP Files
      run: |
          ./squashfs-root/usr/bin/python ./pyfreecadexport/src/pyfreecadexport.py -f "${{ env.FREECAD_FILENAME }}" -p "${{ env.FREECAD_PARTTYPE }}" -d "${{ env.FREECAD_OUTPUT_FOLDER }}" -e "step" -l "squashfs-root/usr/lib/"
          ./squashfs-root/usr/bin/python ./pyfreecadexport/src/pyfreecadexport.py -f "${{ env.FREECAD_FILENAME }}" -p "${{ env.FREECAD_PARTTYPE }}" -d "${{ env.FREECAD_OUTPUT_FOLDER }}" -e "stl" -l "squashfs-root/usr/lib/"
    
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: freecad-export-mechanical
        path: ${{ env.FREECAD_OUTPUT_FOLDER }}
        retention-days: 1
  
  export-freecad-printing:
    env:
      FREECAD_VERSION: "1.1.1"
      FREECAD_FILENAME: "./mechanical/printing.FCStd"
      FREECAD_OUTPUT_FOLDER: "./output"
      FREECAD_PARTTYPE: "PartDesign::Body"
    runs-on: ubuntu-latest
    steps:
    - name: Fetch repository
      uses: actions/checkout@v7
    
    - name: Prepare output directory
      run: |
        mkdir -p ${{ env.FREECAD_OUTPUT_FOLDER }}
        cp -r ./mechanical ${{ env.FREECAD_OUTPUT_FOLDER }}
        cp ./LICENSE ${{ env.FREECAD_OUTPUT_FOLDER }}

    - name: Install FreeCAD
      run: |
          wget https://github.com/FreeCAD/FreeCAD/releases/download/${{ env.FREECAD_VERSION }}/FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage
          chmod 0777 FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage
          ./FreeCAD_${{ env.FREECAD_VERSION }}-Linux-x86_64-py311.AppImage --appimage-extract

    - name: Get FreeCAD Export
      uses: actions/checkout@v7
      with:
        repository: 0x007E/pyfreecadexport
        path: ./
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Export STEP Files
      run: |
          ./squashfs-root/usr/bin/python ./pyfreecadexport/src/pyfreecadexport.py -f "${{ env.FREECAD_FILENAME }}" -p "${{ env.FREECAD_PARTTYPE }}" -d "${{ env.FREECAD_OUTPUT_FOLDER }}" -e "step" -l "squashfs-root/usr/lib/"
          ./squashfs-root/usr/bin/python ./pyfreecadexport/src/pyfreecadexport.py -f "${{ env.FREECAD_FILENAME }}" -p "${{ env.FREECAD_PARTTYPE }}" -d "${{ env.FREECAD_OUTPUT_FOLDER }}" -e "stl" -l "squashfs-root/usr/lib/"
    
    - name: Archive artifacts
      uses: actions/upload-artifact@v7
      with:
        name: freecad-export-printing
        path: ${{ env.FREECAD_OUTPUT_FOLDER }}
        retention-days: 1

  create-release:
    needs: [export-freecad-mechanical, export-freecad-printing]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }}"

      - name: Download FreeCAD Mechanical Artifacts
        uses: actions/download-artifact@v8
        with:
          name: freecad-export-mechanical
          path: ./artifact/freecad/mechanical
      - name: Display structure
        run: ls -R ./artifact/freecad/mechanical
      - name: Create Compressed File
        run: |
          cd ./artifact/freecad
          tar -czvf ../freecad-mechanical.tar.gz ./mechanical
          zip -r ../freecad-mechanical.zip ./mechanical
          cd ..
          cd ..

      - name: Upload FreeCAD Mechanical Files
        run: |
          gh release upload ${{ github.ref_name }} \
            ./artifact/freecad-mechanical.tar.gz \
            ./artifact/freecad-mechanical.zip

      - name: Download FreeCAD Printing Artifacts
        uses: actions/download-artifact@v4
        with:
          name: freecad-export-printing
          path: ./artifact/freecad/printing
      - name: Display structure
        run: ls -R ./artifact/freecad/printing
      - name: Create Compressed File
        run: |
          cd ./artifact/freecad
          tar -czvf ../freecad-printing.tar.gz ./printing
          zip -r ../freecad-printing.zip ./printing
          cd ..
          cd ..

      - name: Upload FreeCAD Printing Files
        run: |
          gh release upload ${{ github.ref_name }} \
            ./artifact/freecad-printing.tar.gz \
            ./artifact/freecad-printing.zip

      - name: Rollback release on failure
        if: failure()
        run: |
          gh release delete "${{ github.ref_name }}" -y --cleanup-tag
          git push --delete origin "${{ github.ref_name }}" || true
